<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- daisyUI and Tailwind css -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- styles for fonts -->
    <style>
      * {
        font-family: "Manrope", sans-serif;
      }
    </style>

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- page title logo -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <title>Payoo Mobile Bank</title>
  </head>

  <body class="min-h-screen bg-[#d9d9d9] max-w-[450px] mx-auto">
    <div class="logo max-w-[260px] mx-auto pt-50 mb-8">
      <img src="./assets/Logo-full.png" alt="logo" />
    </div>

    <div class="form">
      <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto rounded-[10px]">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label font-bold text-neutral">Mobile Number</label>
            <input  value="01234567890" id="login-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-[#d9d9d9] mb-4 " placeholder="Enter Your Number" />
            <label class="label font-bold text-neutral">4 Digit Pin</label>
            <input id="login-password" maxlength="4" minlength="4" type="password" class="input rounded-full bg-[#d9d9d9] mb-2" placeholder="Enter 4 Digit Pin" />
            <button id="login-button" class="btn btn-primary mt-4 rounded-full">Login</button>
          </fieldset>
        </div>
      </div>
    </div>

    <!-- js file -->
    <script src="./js/login.js"></script>
  </body>
</html>
